services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Singapore
    volumes:
      - config:/config
      - /nas/kavita:/data
    ports:
      - 5000:5000
    restart: unless-stopped
volumes:
  config: