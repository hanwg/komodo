# https://github.com/flawiddsouza/Restfox/blob/main/docker-compose.yml

services:
  Restfox:
    image: flawiddsouza/restfox:${RESTFOX_VERSION:-0.14.1}
    container_name: Restfox
    restart: unless-stopped
    ports:
      - "${CUSTOM_PORT_ON_HOST:-4004}:4004"
    volumes:
      - data:/app/data   # mount your collections here; use this path in the "File Workspace" folder path field

volumes:
  data:
