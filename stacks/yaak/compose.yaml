# https://github.com/linuxserver/docker-yaak

services:
  yaak:
    image: lscr.io/linuxserver/yaak:latest
    container_name: yaak
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Singapore
    volumes:
      - config:/config
    ports:
      - 3000:3000
      - 3001:3001
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  config: