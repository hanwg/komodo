services:

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    #command:
    #  - '--web.config.file=/prometheus/web.yml'
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped
    ports:
      - 9190:9090

  grafana:
    image: grafana/grafana
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    ports:
      - 3100:3000
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
